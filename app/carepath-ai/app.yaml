command: ['npm', 'run', 'start']
env:
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: sql-warehouse
  - name: DATABRICKS_SERVING_ENDPOINT_NAME
    valueFrom: serving-endpoint
  # Lakebase endpoint, auto-injected at runtime. PGHOST/PGPORT/PGDATABASE/
  # PGSSLMODE are injected by the platform; see appkit.plugins.json lakebase.
  - name: LAKEBASE_ENDPOINT
    valueFrom: postgres
