bundle:
  name: carepath-ai

variables:
  sql_warehouse_id:
    description: SQL Warehouse ID

resources:
  apps:
    app:
      name: "carepath-ai"
      description: "CarePath AI - trusted, evidence-backed healthcare referrals"
      source_code_path: ./
      user_api_scopes:
        - sql
        - serving.serving-endpoints

      # The resources which this app has access to.
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE
        - name: serving-endpoint
          serving_endpoint:
            name: databricks-meta-llama-3-3-70b-instruct
            permission: CAN_QUERY
        # Lakebase Postgres password — stored in a Databricks secret scope, not
        # in source. app.yaml exposes it to the app as PGPASSWORD via valueFrom.
        # Create/rotate with:
        #   databricks secrets create-scope carepath-ai
        #   databricks secrets put-secret carepath-ai pg-password
        - name: pg-password
          secret:
            scope: carepath-ai
            key: pg-password
            permission: READ
        # Lakebase (Postgres) for Planner Workspace persistence: shortlists,
        # notes, and manual rank overrides. Fill in the project/branch/database
        # resource names from:
        #   databricks postgres list-projects
        #   databricks postgres list-branches  {project-name}
        #   databricks postgres list-databases {branch-name}
        # Lakebase Postgres — wired in a follow-up step. The installed CLI (v1.3.0)
        # only binds classic instances (instance_name/database_name); the existing
        # provisioned Lakebase here is Autoscaling (project/branch/database). Until
        # reconciled, the app connects to Postgres directly (see app.yaml PG* env)
        # and server.ts treats Lakebase as optional.
        # - name: postgres
        #   database:
        #     project: projects/carepath-ai
        #     branch: projects/carepath-ai/branches/production
        #     database: projects/carepath-ai/branches/production/databases/databricks-postgres
        #     permission: CAN_CONNECT_AND_CREATE

targets:
  default:
    default: true
    workspace:
      host: https://dbc-6bf9cc4a-0042.cloud.databricks.com

    variables:
      sql_warehouse_id: 9d552ae43bc1d228
